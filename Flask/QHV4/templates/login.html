<script>
function showLoginAlert(message) {
    const container = document.getElementById("loginAlertContainer");

    const alert = document.createElement("div");
    alert.classList.add("login-alert");
    alert.textContent = message;

    container.appendChild(alert);

    setTimeout(() => {
        alert.remove();
    }, 3000);
}
</script>

<script>
document.querySelector("form").addEventListener("submit", function(event) {
    let user = document.getElementById("apodo").value.trim();
    let pass = document.getElementById("password").value.trim();

    if (user === "" || pass === "") {
        event.preventDefault(); // evita enviar el formulario
        showLoginAlert("Debes llenar todos los campos para iniciar sesión");
    }
});
</script>



<script>
  const registerForm = document.getElementById('registerForm');
const registerAlert = document.getElementById('registerAlert');

registerForm.addEventListener('submit', function(e) {
    let valid = true;

    // Recorremos todos los inputs y selects del formulario
    registerForm.querySelectorAll('input, select').forEach(field => {
        if (!field.value) {
            valid = false;
        }
    });

    if (!valid) {
        e.preventDefault(); // Evita enviar el formulario
        registerAlert.style.display = 'block';

        // Ocultar después de 3 segundos
        setTimeout(() => {
            registerAlert.style.display = 'none';
        }, 3000);
    }
});

</script>


  <script  src="../static/JS/login.js"></script>
    <script src="main.js"></script>
    <script>
      // Modal registro
const openModalBtn = document.getElementById('openRegisterModal');
const registerModal = document.getElementById('registerModal');

openModalBtn.addEventListener('click', () => {
    registerModal.style.display = 'flex';
});

window.addEventListener('click', (e) => {
    if (e.target === registerModal) {
        registerModal.style.display = 'none';
    }
});

    </script>
