<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pantalla de Carga</title>
  <link rel="icon" href="../static/Resourses/Logos/QH.png" type="image/x-icon" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* VIDEO DE FONDO */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* CONTENIDO */
    .loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(-300px);
      z-index: 2;
    }

    .logo {
      width: 300px;
      margin-bottom: 10px;
    }

    #loader-container {
      width: 300px;
      height: 5px;
      border-radius: 10px;
      overflow: hidden;
      background-color: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to bottom, #FDDE61, #FDB839);
      animation: fillBar 7s linear forwards;
    }

    @keyframes fillBar {
      from { width: 0%; }
      to { width: 100%; }
    }
  </style>
</head>

<body>

  <!-- VIDEO DE FONDO -->
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="../static/Resourses/Video/loading.mp4" type="video/mp4">
  </video>

  <div class="loader-wrapper">
    <img src="../static/Resourses/Logos/QH uerto C.png" alt="Logo" class="logo">

    <div id="loader-container">
      <div id="progress-bar"></div>
    </div>
  </div>

  <script>
    // Redirigir después de 4 segundos
    setTimeout(() => {
      window.location.href = "{{ url_for('index') }}";
    }, 8000);
  </script>

</body>
</html>
